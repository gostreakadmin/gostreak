                        "inverse-surface": "#faf8ff",

                        "on-error": "#490006",
                        "surface-container-low": "#091328",
                        "tertiary-fixed-dim": "#ec9100",
                        "on-primary-container": "#004050",
                        "on-primary": "#004a5d",
                        "on-tertiary": "#593400",
                        "on-secondary-fixed-variant": "#515c70",
                        "surface-bright": "#1f2b49",
                        "secondary-fixed-dim": "#cad5ed",
                        "primary-fixed-dim": "#00c0ea",
                        "outline": "#6d758c",
                        "error-container": "#9f0519",
                        "inverse-primary": "#006880",
                        "error": "#ff716c",

                        "secondary-dim": "#cad5ed",

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #060e20;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #40485d;
            border-radius: 10px;
        }

        .prose pre {
            background-color: #0f1930;
            border: 1px solid rgba(64, 72, 93, 0.15);
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
        }

        .prose code {
            color: #69daff;
            background-color: rgba(31, 43, 73, 0.5);

<body class="bg-surface text-on-surface font-body selection:bg-primary/30">
    <nav class="fixed top-0 w-full z-50 bg-[#060e20]/90 backdrop-blur-md border-b border-outline-variant/20 shadow-sm">
        <div class="flex items-center justify-between px-6 md:px-12 py-4 w-full max-w-screen-2xl mx-auto">
            <div
                class="text-2xl font-bold tracking-tighter text-[#69daff] font-['Space_Grotesk'] flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">terminal</span><a href="index.html">
                    GoStreak</a>
            </div>
            <div class="hidden md:flex items-center space-x-8 font-['Space_Grotesk'] tracking-tight">
                <a class="text-slate-400 hover:text-white transition-colors" href="index.html">Home</a>
                <a class="text-slate-400 hover:text-white transition-colors" href="pricing.html">Pricing</a>
                <a class="text-[#69daff] font-medium" href="dailyproblem.html">Today Problems</a>
                <a class="text-slate-400 hover:text-white transition-colors" href="login.html">Dashboard</a>
            </div>
            <div class="flex items-center space-x-4">
                <img alt="User profile avatar"
                    class="w-8 h-8 rounded-full border border-outline-variant/30 cursor-pointer hover:border-primary transition-colors"
                    src="https://assets.leetcode.com/users/leetcode/avatar_1568224780.png" />
            </div>
        </div>
    </nav>

    <main class="pt-28 pb-12 px-6 md:px-12 max-w-5xl mx-auto min-h-screen">
        <div class="space-y-6">
            <div
                class="flex flex-col md:flex-row md:items-center justify-between gap-6 pb-6 border-b border-outline-variant/15">
                <div>
                    <div class="flex items-center gap-3 mb-3">
                        <span
                            class="px-2.5 py-1 bg-primary/10 text-primary text-[0.6875rem] font-label font-bold uppercase tracking-widest rounded">Problem
                            of the Day</span>
                        <span id="problem-meta"
                            class="text-on-surface-variant text-sm font-label animate-pulse bg-surface-bright h-4 w-24 rounded"></span>
                    </div>
                    <h1 id="problem-title"
                        class="text-3xl md:text-4xl font-headline font-bold tracking-tight text-white">Connecting to
                        LeetCode...</h1>
                </div>
                <div class="flex shrink-0">
                    <a id="solve-btn" href="#" target="_blank"
                        class="bg-primary hover:bg-primary-container text-on-primary-fixed px-6 py-3 rounded-lg font-headline font-bold text-sm transition-colors flex items-center gap-2 shadow-lg shadow-primary/20">
                        Solve on LeetCode
                        <span class="material-symbols-outlined text-[18px]">open_in_new</span>
                    </a>
                </div>
            </div>

            <div
                class="bg-surface-container-low border border-outline-variant/20 rounded-xl overflow-hidden min-h-[500px] flex flex-col shadow-lg shadow-black/20">
                <div class="flex bg-surface-container/50 px-8 py-4 border-b border-outline-variant/20 items-center justify-between">
                    <span class="text-primary font-label text-sm font-bold uppercase tracking-widest flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">description</span>
                        Problem Description
                    </span>
                    <div id="problem-tags" class="flex flex-wrap gap-2">
                        </div>
                </div>

                <div class="flex-grow p-8 md:p-12 bg-surface-container-lowest custom-scrollbar overflow-y-auto">
                    <div id="problem-content"
                        class="prose prose-invert max-w-none text-on-surface/90 font-body leading-relaxed prose-headings:font-headline prose-headings:text-white prose-a:text-primary">
                        <div class="flex items-center gap-3 text-on-surface-variant animate-pulse">
                            <span class="material-symbols-outlined animate-spin">sync</span>
                            <p>Syncing today's algorithmic challenge...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-outline-variant/20 bg-surface mt-12">
        <div
            class="flex flex-col md:flex-row justify-between items-center px-6 md:px-12 py-8 w-full max-w-screen-2xl mx-auto">
            <div class="text-lg font-black text-white font-headline flex items-center gap-2 mb-4 md:mb-0">
                <span class="material-symbols-outlined text-primary text-[20px]">terminal</span>
                GoStreak
            </div>
            <p class="text-slate-500 font-label text-[0.6875rem] uppercase tracking-widest">© 2026 GoStreak. Fuel your
                flow state.</p>
        </div>
    </footer>

    <script>
        async function loadDailyProblem() {
            const titleEl = document.getElementById('problem-title');
            const metaEl = document.getElementById('problem-meta');
            const contentEl = document.getElementById('problem-content');
            const tagsEl = document.getElementById('problem-tags');
            const solveBtn = document.getElementById('solve-btn');

            try {
                const response = await fetch('https://alfa-leetcode-api.onrender.com/daily');
                if (!response.ok) throw new Error("API response was not ok");

                const data = await response.json();

                titleEl.textContent = data.questionTitle;

                let diffColor = 'text-emerald-400';
                if (data.difficulty === 'Medium') diffColor = 'text-tertiary';
                if (data.difficulty === 'Hard') diffColor = 'text-error';

                metaEl.className = 'text-on-surface-variant text-sm font-label'; 
                metaEl.innerHTML = `#${data.questionFrontendId} &bull; <span class="${diffColor} font-bold">${data.difficulty}</span>`;

                contentEl.innerHTML = data.question;

                if (data.topicTags && data.topicTags.length > 0) {
                    tagsEl.innerHTML = data.topicTags.map(tag =>
                        `<span class="px-2 py-0.5 bg-surface-bright border border-outline-variant/10 text-[0.625rem] text-on-surface-variant rounded font-label uppercase tracking-wider font-semibold">${tag.name}</span>`
                    ).join('');
                } else {
                    tagsEl.innerHTML = ``;
                }

                solveBtn.href = data.questionLink;

            } catch (error) {
                console.error("Error fetching daily problem:", error);
                titleEl.textContent = "Error Loading Problem";
                metaEl.textContent = "Please try again later";
                contentEl.innerHTML = "<p class='text-error bg-error/10 p-4 rounded-lg border border-error/20'>The API limit may have been reached or the server is spinning up. Please refresh the page in a few seconds.</p>";
            }
        }

        window.onload = loadDailyProblem;
    </script>
</body>

</html>
