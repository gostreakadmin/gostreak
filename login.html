<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="logo1.png">
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | GoStreak</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #060e20;
        }

        .font-headline {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-[#091328] border border-blue-500/20 rounded-2xl p-10 shadow-2xl">
        <div class="text-center mb-10">
            <center>
                <a href="index.html">
                    <img src="logo1.png" alt="GoStreak - Fuel Your Flow State" style="height: 40px; width: auto;">
                </a>
            </center>
            <h1 class="text-3xl font-bold font-headline text-blue-400 tracking-tighter case">GoStreak</h1>
            <p class="text-slate-500 text-[10px] mt-2 uppercase tracking-[0.3em] font-black">Authentication Protocol</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-blue-500 mb-2">LeetCode
                    Username</label>
                <input type="text" id="username" required
                    class="w-full bg-[#060e20] border-slate-800 rounded-xl text-white p-3 outline-none"
                    placeholder="Enter ID">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-blue-500 mb-2">Access
                    Key</label>
                <input type="password" id="password" required
                    class="w-full bg-[#060e20] border-slate-800 rounded-xl text-white p-3 outline-none"
                    placeholder="••••••••">
            </div>
            <button type="submit" id="submitBtn"
                class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl active:scale-95 transition-all">
                INITIALIZE SYNC
            </button>
        </form>

        <a href="index.html" class="block mt-4">
            <button type="button" id="homeBtn"
                class="w-full py-4 bg-slate-600 hover:bg-slate-500 text-white font-bold rounded-xl active:scale-95 transition-all">
                Return to Home
            </button>
        </a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.innerText = "VERIFYING IDENTITY...";

            try {
                // Attempt 1: Try to ping the LeetCode API
                const response = await fetch(`https://alfa-leetcode-api.onrender.com/${username}`);

                if (!response.ok) throw new Error("API Server Offline");

                const data = await response.json();

                // Check if the API explicitly says the user doesn't exist
                if (data.errors && data.errors.length > 0) {
                    alert("ERROR: Username not found on LeetCode. Please check your spelling.");
                    resetBtn(btn);
                } else {
                    // Success: The user exists
                    grantAccess(username);
                }

            } catch (err) {
                // BULLETPROOF FALLBACK: If the API is down/sleeping, don't lock the user out.
                console.warn("API Connection Failed:", err);

                const forceLogin = confirm(
                    "The LeetCode verification server is currently busy or offline.\n\n" +
                    "Do you want to use the Developer Override to enter the dashboard anyway?"
                );

                if (forceLogin) {
                    grantAccess(username);
                } else {
                    resetBtn(btn);
                }
            }
        });

        // Helper function to grant access
        function grantAccess(username) {
            localStorage.setItem('gs_auth_user', username);
            window.location.href = 'userprofile.html';
        }

        // Helper function to reset the button
        function resetBtn(btn) {
            btn.disabled = false;
            btn.innerText = "INITIALIZE SYNC";
        }
    </script>
</body>

</html>
