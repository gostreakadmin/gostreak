<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download DBMS Resources</title>
    <style>
        /* Modern Reset and Layout */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa; /* Slightly different background for variety */
        }

        .download-container {
            text-align: center;
            padding: 20px;
        }

        /* Styling the DBMS Download Button */
        .btn-download {
            background-color: #28a745; /* Green color for DBMS */
            color: white;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }

        /* Hover Effects */
        .btn-download:hover {
            background-color: #218838;
            transform: scale(1.05); /* Slight grow effect */
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        p {
            color: #777;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="download-container">
        <h1>DBMS Resources</h1>
        <a href="dbms.zip" download="dbms.zip" class="btn-download">
            Download dbms.zip
        </a>
        <p>Your Database Management Systems package is ready.</p>
    </div>

</body>
</html>
