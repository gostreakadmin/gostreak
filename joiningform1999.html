<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration & Payment Form | GOSTREAK</title>
    <link rel="stylesheet" href="joinformstylr.css">
</head>

<body>

    <div class="form-container">
        <center>
            <h1>GOSTREAK</h1>
        </center>
        <h2>Joining Form</h2>
        <p class="subtitle">Please complete the payment and fill in the details below.</p>
        <p class="important-note">Note: Ensure that the LeetCode credentials provided are correct for verification
            purposes.</p>

        <div class="payment-section">
            <p><strong>Step 1: Scan to Pay</strong></p>
            <img src="your-qr-code-link.png" alt="Payment QR Code" class="qr-code">
            <p class="payment-note">Amount: ₹1999.00</p>
        </div>

        <hr>

        <form id="gostreak-form" action="YOUR_SCRIPT_URL" method="POST">

            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" name="name" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Gmail Address *</label>
                <input type="email" name="email" id="email" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group-row">
                <div class="form-group">
                    <label for="lt-user">LeetCode Username *</label>
                    <input type="text" name="leetcode_user" id="lt-user" required>
                </div>
                <div class="form-group">
                    <label for="lt-pass">LeetCode Password *</label>
                    <input type="password" name="leetcode_pass" id="lt-pass" required>
                </div>
            </div>

            <div class="form-group">
                <label for="ref-id">Reference ID (Optional)</label>
                <input type="text" name="reference_id" id="ref-id" placeholder="Enter ID if any">
            </div>

            <div class="form-group">
                <label for="trans-id">Transaction ID *</label>
                <input type="text" name="transaction_id" id="trans-id" placeholder="UTR / Transaction No." required>
            </div>

            <div class="form-group">
                <label for="language">Language *</label>
                <input type="text" name="language" id="language" placeholder="e.g., Python, Java" required>
            </div>

            <div class="form-group">
                <label for="contact">Contact Number *</label>
                <input type="tel" name="contact" id="contact" placeholder="Enter your contact number" required>
            </div>

            <div class="form-group">
                <label for="screenshot">Upload Payment Screenshot *</label>
                <input type="file" id="screenshot-file" accept="image/*" required>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Submit Registration</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('gostreak-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Uploading & Syncing...";

            const fileInput = document.getElementById('screenshot-file');
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function () {
                const base64Data = reader.result.split(',')[1];
                const formData = new FormData(form);
                const params = new URLSearchParams();

                // Add text fields
                for (const pair of formData.entries()) {
                    params.append(pair[0], pair[1]);
                }

                // Add image fields
                params.append("image_data", base64Data);
                params.append("image_type", file.type);
                params.append("image_name", file.name);

                fetch(form.action, {
                    method: 'POST',
                    body: params
                })
                    .then(res => res.json())
                    .then(response => {
                        if (response.result === "success") {
                            alert("Success! Your registration is complete and data is saved.");
                            form.reset();
                        } else {
                            alert("Error: " + response.error);
                        }
                    })
                    .catch(error => alert("Connection Error. Check your Script URL."))
                    .finally(() => {
                        btn.disabled = false;
                        btn.innerText = "Submit Registration";
                    });
            };

            reader.readAsDataURL(file);
        });
    </script>
</body>

</html>
