<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Algorithms Resources</title>
    <style>
        /* Modern Reset and Layout */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Dark professional background */
        }

        .download-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); /* Glassmorphism effect */
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Styling the Algorithms Download Button */
        .btn-download {
            background-color: #3b82f6; /* Technical blue for Algorithms */
            color: white;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
            display: inline-block;
        }

        /* Hover Effects */
        .btn-download:hover {
            background-color: #2563eb;
            transform: translateY(-3px); /* Slight lift effect */
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.4);
        }

        h1 {
            color: #f1f5f9;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        p {
            color: #64748b;
            margin-top: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="download-container">
        <h1>Algorithms Lab</h1>
        <div class="subtitle">24CST404 - Laboratory Resources</div>
        
        <a href="algo.zip" download="algo.zip" class="btn-download">
            Download algorithms.zip
        </a>
        
        <p>Package includes C implementations and complexity analysis.</p>
    </div>

</body>
</html>
